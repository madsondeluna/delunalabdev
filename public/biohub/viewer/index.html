<!DOCTYPE html>
<html lang="en">
<head>
    <script>try{var t=localStorage.getItem("theme");if(t==="dark")document.documentElement.classList.add("dark-mode");else if(t==="light")document.documentElement.classList.add("light-mode")}catch(e){}</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDBViewer</title>
    
    
    
    
    <link rel="stylesheet" href="../_shared.css">
    
    <script src="https://unpkg.com/ngl@2.0.0-dev.38/dist/ngl.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>3D PDB Viewer</h1>
            <p id="typing-text">interactive 3d molecular viewer for pdb structures</p>
            <nav>
                <a href="/biohub" class="nav-link">← Back to BioHub</a>
            </nav>
        </header>

        <main>
            <div class="viewer-layout">
                <div id="viewer-controls">
                    <div class="control-group">
                        <label for="pdb-upload-3d" class="upload-btn">Load PDB File</label>
                        <input type="file" id="pdb-upload-3d" accept=".pdb" hidden>
                        <div id="file-name-display-3d">No structure loaded.</div>
                    </div>
                    <div class="control-group">
                        <label for="representation-select">Representation</label>
                        <select id="representation-select">
                            <option value="cartoon" selected>Cartoon</option>
                            <option value="ball+stick">Ball+Stick</option>
                            <option value="spacefill">Spacefill</option>
                            <option value="surface">Surface</option>
                            <option value="licorice">Licorice</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label for="color-select">Color Scheme</label>
                        <select id="color-select">
                            <option value="chainindex" selected>By Chain</option>
                            <option value="residueindex">Rainbow</option>
                            <option value="element">By Element (CPK)</option>
                            <option value="sstruc">By Secondary Structure</option>
                        </select>
                    </div>
                    <div class="control-group action-buttons">
                        <button id="center-btn">Center View</button>
                        <button id="spin-btn">Toggle Spin</button>
                    </div>
                </div>

                <div id="viewport"></div>
            </div>
        </main>
        
    </div>

    <script src="js/viewer.js"></script>
    <footer>
        <span>&copy; 2026 gromads</span>
        <div class="footer-links">
            <a href="https://madsondeluna.com">portfolio</a>
            <a href="https://github.com/madsondeluna">github</a>
            <a href="https://x.com/madsondeluna">twitter</a>
            <a href="https://www.linkedin.com/in/madsonaragao/">linkedin</a>
            <a href="mailto:madsondeluna@gmail.com">mail</a>
        </div>
    </footer>
</body>
</html>
